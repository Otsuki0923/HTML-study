<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML基礎レッスン</title>
  </head>
  <body>
    <!-- Step 1: 見出しを書いてみよう -->
    <h1>自己紹介ページ</h1>
    <!-- Step 2: ここに <h2> と <p> を追加しよう -->
    <h2>初めまして</h2>
    <p>
      私の名前は大月俊祐です。プロゲーマー専攻で毎日いろんな練習をしています。
    </p>
    <p>趣味は車とゲームです。</p>

    <h2>好きな食べ物</h2>
    <p>からあげ</p>
    <!-- Step 3: ここに <ul> または <ol> のリストを追加しよう -->
    <h2>趣味リスト</h2>
    <ul>
      <li>釣り</li>
      <li>ゲーム</li>
      <li>車</li>
    </ul>
    <h2>好きな食べ物ランキング</h2>
    <ol>
      <li>からあげ</li>
      <li>ネギマグロ</li>
      <li>味噌汁</li>
    </ol>
    <!-- Step 4: ここに <a> リンクと <img> 画像を追加しよう -->
    <h2>リンク</h2>
    <p><a href="https://playvalorant.com/ja-jp/">valorantを開く</a></p>
    <h2>画像</h2>
    <img
      src="https://tse3.mm.bing.net/th/id/OIP.KoelX2_a6dnZv_AK4sZOdQHaEK?pid=ImgDet&w=243&h=136.6875&c=7&dpr=1.3&o=7&rm=3"
      alt="サンプル画像"
    />
    <!-- Step 5: <div> でグループ化してみよう -->
    <div>
      <h2>プロフィール</h2>
      <p>大月俊祐 / 19歳</p>
      <p>大阪府在住</p>
    </div>

    <div>
      <h2>趣味</h2>
      <ul>
        <li>車</li>
        <li>ゲーム</li>
      </ul>
    </div>
  </body>
</html>
